<header>
  <div class="topnav" id="myTopnav" [class.responsive]="menuOpen()" [class.titleOnly]="!isLanding()">
    <!-- Logo / Home -->
    <a id="logo" class="active" (click)="goHome()" [attr.aria-label]="isLanding() ? 'Go to top' : 'Go to home'" role="button" tabindex="0"></a>

    <!-- Landing-only: section anchors with scroll + active underline -->
    <ng-container *ngIf="isLanding(); else atlasTitleOnly">
      <a class="navtext" (click)="goTo('circular_events')" [class.active]="activeSection() === 'circular_events'" role="button" tabindex="0">
        Circular Events
      </a>
      <a class="navtext" (click)="goTo('circular_action')" [class.active]="activeSection() === 'circular_action'" role="button" tabindex="0">
        Circular Action
      </a>
      <a class="navtext" (click)="goTo('circular_atlas_demo')" [class.active]="activeSection() === 'circular_atlas_demo'" role="button" tabindex="0">
        Circular Atlas
      </a>
      <a class="navtext" (click)="goTo('footer')" [class.active]="activeSection() === 'footer'" role="button" tabindex="0">
        Contact
      </a>
      <a id="icon" (click)="toggleHamburger()" aria-label="Toggle menu">&#9776;</a>
    </ng-container>

    <!-- Non-landing (atlas, events): title + search bar -->
    <ng-template #atlasTitleOnly>
      <h4 id="nav-title" aria-label="Page title">
        <a (click)="goHome()">
          <img class="arrow" [src]="'assets/img/arrowback.png'" alt="arrow" />
        </a>
        {{ nonLandingTitle }}
      </h4>
      <a id="icon" (click)="toggleHamburger()" aria-label="Toggle menu">&#9776;</a>
    </ng-template>
  </div>


  <!-- 🔐 Auth controls (top-right) -->
  <div id="authHeader">
    <ng-container *ngIf="(auth.user$ | async) as user; else loggedOut">
      <div id="profileMenu" class="profile">
        <img id="avatar" [src]="user.photoURL || 'assets/img/avatar.png'" alt="profile" />
        <div class="menu">
          <div class="dropdown-item" style="font-weight:600;">Welcome!</div>
          <div class="dropdown-item small text-muted">{{ user.email }}</div>
          <ng-container *ngIf="admin$ | async">
            <div class="dropdown-divider" style="height:1px;background:#eee;margin:.25rem 0;"></div>
            <a class="dropdown-item admin-link" routerLink="/admin/review">Review queue</a>
            <a class="dropdown-item admin-link" routerLink="/admin/places">Places catalogue</a>
            <a class="dropdown-item admin-link" routerLink="/admin/events">Events catalogue</a>
          </ng-container>
          <div class="dropdown-divider" style="height:1px;background:#eee;margin:.25rem 0;"></div>
          <button id="signout" class="dropdown-item" (click)="logout()">Sign out</button>
        </div>
      </div>
    </ng-container>

    <ng-template #loggedOut>
      <button id="loginBtn" class="btn btn-sm btn-light" (click)="openLogin()">Sign in</button>
    </ng-template>
  </div>
</header>
