<section class="events-page">
  <h1 class="events-page-title">Upcoming Events</h1>

  <div class="map-action-tags-row">
    <button
      *ngFor="let tag of actionTagIds"
      type="button"
      class="map-action-tag-toggle"
      [class.active]="isActionTagEnabled(tag)"
      [style.--tag-color]="actionTagColor(tag)"
      [style.--tag-text-color]="actionTagTextColor(tag)"
      (click)="toggleActionTag(tag)"
    >
      {{ actionTagLabel(tag) }}
    </button>
  </div>

  <div class="events-layout">
    <aside class="events-sidebar">

      <div class="filter-section">
        <div class="search-box">
          <span class="search-icon" aria-hidden="true">🔍</span>
          <input
            type="search"
            class="search-input"
            placeholder="Search places and events..."
            [value]="searchService.query()"
            (input)="onSearchInput($event)"
            aria-label="Search places and events"
          />
        </div>
      </div>
      
      <div class="filter-section">
        <h3>Filter by Category</h3>
        <div class="category-filters">
          <button
            *ngFor="let cat of categories"
            type="button"
            class="category-pill"
            [class.active]="selectedCategory() === cat.id"
            (click)="selectCategory(cat.id)"
          >
            <span>{{ cat.label }}</span>
          </button>
        </div>
      </div>

      <div class="filter-section">
        <h3>Select Date</h3>
        <app-calendar
          [eventDates]="eventDatesForCalendar"
          [initialSelection]="initialCalendarSelection"
          [initialViewDate]="initialCalendarViewDate"
          (selectedDatesChange)="onDatesChange($event)"
        ></app-calendar>
      </div>
    </aside>

    <div class="events-content">
      <div class="events-grid">
        <article
          *ngFor="let event of filteredEvents()"
          class="event-card"
          [class.selected-event]="selectedEventId() === event.id"
        >
          <div class="event-card-content">
            <div class="event-card-header">
              <div class="category-tag">{{ event.category | titlecase }}</div>
              <button
                type="button"
                class="fav-btn"
                [class.favorited]="eventFavorites.isFavorite(event.id)"
                [attr.aria-label]="eventFavorites.isFavorite(event.id) ? 'Remove from favorites' : 'Add to favorites'"
                (click)="toggleFavorite(event.id)"
              >
                {{ eventFavorites.isFavorite(event.id) ? '♥' : '♡' }}
              </button>
            </div>
            <h2 class="event-title">{{ event.title }}</h2>
            <p class="event-description">{{ event.description }}</p>
            <p class="event-date">
              <span class="date-icon" aria-hidden="true">📅</span>
              {{ event.dateStr }}
            </p>
            <p class="event-location">
              <span class="pin-icon" aria-hidden="true">📍</span>
              {{ event.location }}
            </p>
            <p class="event-time">
              <span class="clock-icon" aria-hidden="true">🕐</span>
              {{ event.time }}
            </p>
          </div>
        </article>
      </div>
    </div>
  </div>
</section>
