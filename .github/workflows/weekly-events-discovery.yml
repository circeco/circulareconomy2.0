name: Weekly Events Discovery

on:
  schedule:
    # 03:00 UTC every Monday.
    - cron: '0 3 * * 1'
  workflow_dispatch:
    inputs:
      cities:
        description: Comma-separated city IDs
        required: false
        default: milan,stockholm
      limit:
        description: Max queue writes per city
        required: false
        default: '100'
      event_max_past_days:
        description: Include events started up to N days ago (0 = only today/future)
        required: false
        default: '0'

permissions:
  contents: read

concurrency:
  group: weekly-events-discovery
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FIREBASE_PROJECT_ID: circeco-bf511
      DEFAULT_CITIES: milan,stockholm
      DEFAULT_LIMIT: '100'
      DEFAULT_EVENT_MAX_PAST_DAYS: '0'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Write service account credentials
        shell: bash
        run: |
          set -euo pipefail
          CRED_PATH="$RUNNER_TEMP/firebase-sa.json"
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT_CIRCECO_BF511 }}' > "$CRED_PATH"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$CRED_PATH" >> "$GITHUB_ENV"

      - name: Resolve runtime parameters
        id: params
        shell: bash
        run: |
          set -euo pipefail

          CITIES='${{ github.event.inputs.cities }}'
          LIMIT='${{ github.event.inputs.limit }}'
          EVENT_MAX_PAST_DAYS='${{ github.event.inputs.event_max_past_days }}'

          if [ -z "${CITIES:-}" ]; then CITIES="$DEFAULT_CITIES"; fi
          if [ -z "${LIMIT:-}" ]; then LIMIT="$DEFAULT_LIMIT"; fi
          if [ -z "${EVENT_MAX_PAST_DAYS:-}" ]; then EVENT_MAX_PAST_DAYS="$DEFAULT_EVENT_MAX_PAST_DAYS"; fi

          echo "cities=$CITIES" >> "$GITHUB_OUTPUT"
          echo "limit=$LIMIT" >> "$GITHUB_OUTPUT"
          echo "event_max_past_days=$EVENT_MAX_PAST_DAYS" >> "$GITHUB_OUTPUT"

      - name: Run weekly events discovery
        run: |
          npm run discover:monthly -- \
            --cities='${{ steps.params.outputs.cities }}' \
            --limit='${{ steps.params.outputs.limit }}' \
            --sources='events' \
            --event-max-past-days='${{ steps.params.outputs.event_max_past_days }}' \
            --run-label='weekly_events'
